<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>BlindSpot — AI Item Finder</title>
  <link rel="stylesheet" href="/static/style.css?v=8" />
</head>
<body>

  <!-- Status bar -->
  <header class="status-bar" role="banner">
    <div class="status-top">
      <div class="logo">BlindSpot</div>
      <div class="privacy-badge" aria-live="polite">
        <span class="privacy-dot"></span>
        Privacy Mode Active
      </div>
    </div>
    <div id="wake-indicator" class="wake-indicator idle" aria-live="polite" aria-label="Wake word status">
      <span class="wake-dot"></span>
      <span id="wake-label">Say "Hey BlindSpot"…</span>
    </div>
  </header>

  <!-- Camera viewfinder -->
  <main class="viewfinder-container" aria-label="Camera viewfinder">
    <video id="camera" autoplay playsinline muted aria-label="Live camera feed"></video>
    <canvas id="snapshot-canvas" aria-hidden="true"></canvas>

    <!-- Continuous mode overlay -->
    <div id="scanning-overlay" class="scanning-overlay hidden" aria-live="polite" aria-label="Scanning status">
      <div class="scan-pulse"></div>
      <span id="scanning-label">Scanning…</span>
    </div>

    <!-- Privacy alert banner (shown when sensitive item detected) -->
    <div id="privacy-alert" class="privacy-alert hidden" role="alert" aria-live="assertive" aria-atomic="true">
      <span class="privacy-alert-icon">🔴</span>
      <div class="privacy-alert-body">
        <strong>Privacy Alert</strong>
        <span id="privacy-alert-detail">Sensitive item detected — content ignored</span>
      </div>
      <button id="privacy-alert-dismiss" class="privacy-alert-dismiss" aria-label="Dismiss privacy alert">✕</button>
    </div>
  </main>

  <!-- AI Response panel -->
  <section class="response-panel" aria-label="AI guidance">
    <div id="response-text" class="response-text" aria-live="assertive" aria-atomic="true">
      Tap anywhere once to enable audio, then say "Hey BlindSpot" to find things.
    </div>
    <div id="status-indicator" class="status-indicator" aria-live="polite"></div>
  </section>

  <!-- Controls -->
  <section class="controls" aria-label="Controls">
    <!-- Query input row -->
    <div class="query-row">
      <input
        type="text"
        id="query-input"
        class="query-input"
        placeholder='e.g. "I dropped my keys"'
        aria-label="Describe what you are looking for"
        autocomplete="off"
      />
      <button
        id="mic-btn"
        class="icon-btn"
        aria-label="Use microphone to speak your query"
        title="Voice input"
      >🎤</button>
    </div>

    <!-- Action buttons -->
    <div class="action-row">
      <button id="snap-btn" class="btn btn-primary" aria-label="Take a single snapshot and analyze">
        📷 Analyze
      </button>
      <button id="continuous-btn" class="btn btn-secondary" aria-label="Start continuous scanning mode">
        🔄 Start Scanning
      </button>
      <button id="camera-switch-btn" class="btn btn-ghost" aria-label="Switch between front and back camera">
        🔃 Flip
      </button>
    </div>
  </section>

  <!-- Tap-to-start overlay — iOS requires a real tap before any audio plays -->
  <div id="start-overlay" style="
    position:fixed;inset:0;z-index:999;
    background:#1a1a2e;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
    cursor:pointer;user-select:none;
  ">
    <div style="font-size:2.2rem;font-weight:800;color:#00d4ff;letter-spacing:3px;">BlindSpot</div>
    <div style="font-size:1rem;color:#a0aec0;">AI Item Finder</div>
    <div style="margin-top:12px;padding:18px 40px;background:#00d4ff;color:#000;font-size:1.1rem;font-weight:700;border-radius:12px;">
      Tap to Start
    </div>
    <div style="font-size:0.78rem;color:#a0aec0;margin-top:4px;">Enables voice — required by iOS</div>
  </div>

  <script src="/static/app.js?v=8"></script>
</body>
</html>
